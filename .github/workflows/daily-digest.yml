name: Security Skills Training Digest

on:
  schedule:
    # Runs at 6:00 AM EST (12:00 UTC) Friday, Saturday, Sunday
    # Friday=5, Saturday=6, Sunday=0
    # EST (winter): 6am EST = 12pm UTC
    # EDT (summer): 6am EDT = 11am UTC
    - cron: '0 12 * * 0,5,6'

  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    env:
      # Future-proof for Node.js 24 migration (June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Generate and send digest
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          cd scripts
          python generate_digest.py

      - name: Save digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-digest-${{ github.run_number }}
          path: scripts/training-digests/*.md
          retention-days: 90
